<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon — ProminentLifecare</title>
<meta name="description" content="PromQ Prime — Ultrapure (Type I) Water Purification System by Prominent Lifecare Pvt. Ltd. Launching 10 May 2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/coming-soon.css">
</head>
<body>

<!-- Background -->
<div class="bg-canvas">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="grid-lines"></div>

<!-- Floating water particles -->
<div class="particles" id="particles"></div>

<div class="wrapper">

  <!-- Badge -->
  <div class="badge">
    <span class="badge-dot"></span>
    Coming Soon
  </div>

  <!-- Brand -->
  <div class="brand">
    <svg class="logo-mark" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="35" cy="35" r="33" stroke="rgba(56,182,255,0.2)" stroke-width="1" stroke-dasharray="4 3"/>
      <circle cx="35" cy="35" r="27" stroke="rgba(56,182,255,0.12)" stroke-width="1"/>
      <path d="M35 14 C35 14, 20 28, 20 38 C20 47, 27 54, 35 54 C43 54, 50 47, 50 38 C50 28, 35 14, 35 14Z"
            fill="url(#dropGrad)"/>
      <ellipse cx="29" cy="34" rx="4" ry="6" fill="white" opacity="0.2" transform="rotate(-20 29 34)"/>
      <circle cx="23" cy="21" r="2.5" fill="rgba(56,182,255,0.6)"/>
      <circle cx="47" cy="21" r="2.5" fill="rgba(56,182,255,0.6)"/>
      <line x1="25" y1="22" x2="31" y2="26" stroke="rgba(56,182,255,0.3)" stroke-width="1"/>
      <line x1="45" y1="22" x2="39" y2="26" stroke="rgba(56,182,255,0.3)" stroke-width="1"/>
      <defs>
        <linearGradient id="dropGrad" x1="35" y1="14" x2="35" y2="54" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#38b6ff"/>
          <stop offset="100%" stop-color="#1a4e8a"/>
        </linearGradient>
      </defs>
    </svg>

    <div class="wordmark">Prominent<span>Lifecare</span></div>
    <div class="tagline">Ultra Pure Water &nbsp;·&nbsp; Lab &amp; Pharma Grade</div>
    <div class="partner">Your partner for ultrapure water &amp; ultrapure water systems</div>
  </div>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-drop"></div>
    <div class="divider-line"></div>
  </div>

  <!-- Countdown -->
  <div class="countdown-wrap">
    <div class="countdown">
      <div class="count-block">
        <span class="count-num" id="cd-days">00</span>
        <span class="count-label">Days</span>
      </div>
      <span class="count-sep">:</span>
      <div class="count-block">
        <span class="count-num" id="cd-hours">00</span>
        <span class="count-label">Hours</span>
      </div>
      <span class="count-sep">:</span>
      <div class="count-block">
        <span class="count-num" id="cd-mins">00</span>
        <span class="count-label">Mins</span>
      </div>
      <span class="count-sep">:</span>
      <div class="count-block">
        <span class="count-num" id="cd-secs">00</span>
        <span class="count-label">Secs</span>
      </div>
    </div>
  </div>

  <div class="launch-note">Launching · <span>10 May 2026</span></div>

  <div class="purity">
    <div class="purity-line"></div>
    H₂O &nbsp;≥ 99.9999% Purity
    <div class="purity-line"></div>
  </div>

</div>

<!-- Sneak-peek link to product showcase -->
<a href="home.html" class="preview-link">Preview Site →</a>

<script src="js/coming-soon.js" defer></script>
</body>
</html>
